name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: harmony
          POSTGRES_PASSWORD: harmony
          POSTGRES_DB: harmony
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U harmony"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 5s --health-retries 10

    env:
      DATABASE_URL: postgresql://harmony:harmony@localhost:5432/harmony?schema=public
      REDIS_URL: redis://localhost:6379
      WEB_ORIGIN: http://localhost:3000
      NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Init DB extensions
        run: |
          PGPASSWORD=harmony psql -h localhost -U harmony -d harmony -f infra/postgres/init.sql

      - name: Generate Prisma client
        run: pnpm --filter @harmony/api db:generate

      - name: Set up database schema
        working-directory: apps/api
        run: |
          pnpm exec prisma db push --skip-generate
          for f in prisma/sql/*.sql; do
            echo "Applying $f"
            pnpm exec prisma db execute --file "$f" --schema prisma/schema.prisma
          done

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Upload coverage
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: |
            apps/api/coverage
            apps/web/coverage
