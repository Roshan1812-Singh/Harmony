name: Keep backend warm

# Render's free tier spins the backend down after ~15 min of inactivity, and the
# next request then takes 30-90s (cold start) — which makes the web app and the
# Android APK show "nothing loading" / errors on first open. This pings the
# health endpoint on a schedule so the service stays awake.
#
# Note: GitHub's scheduled runs are best-effort and can be delayed under load, so
# this greatly reduces — but cannot 100% guarantee elimination of — cold starts.
# For rock-solid uptime, use an external monitor (e.g. UptimeRobot) or a paid tier.

on:
  schedule:
    - cron: '*/10 * * * *' # every 10 minutes
  workflow_dispatch: {}

concurrency:
  group: keep-warm
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping health endpoint
        run: |
          URL="https://harmony-api-js9m.onrender.com/api/v1/healthz"
          echo "Pinging $URL"
          code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 120 "$URL" || echo "000")
          echo "Response: HTTP $code"
          # A cold start can still be booting; treat anything that answered as success.
          if [ "$code" = "000" ]; then
            echo "::warning::No response (service may be cold-starting)."
          fi
