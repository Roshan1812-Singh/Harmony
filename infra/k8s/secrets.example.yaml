# Replace with sealed-secrets, external-secrets, or your provider's mechanism in production.
# NEVER commit real secret values.
apiVersion: v1
kind: Secret
metadata:
  name: harmony-api-secrets
  namespace: harmony
type: Opaque
stringData:
  DATABASE_URL: postgresql://harmony:CHANGE_ME@postgres:5432/harmony?schema=public
  REDIS_URL: redis://redis:6379
  JWT_ACCESS_PRIVATE_KEY: |
    -----BEGIN PRIVATE KEY-----
    REPLACE_ME
    -----END PRIVATE KEY-----
  JWT_ACCESS_PUBLIC_KEY: |
    -----BEGIN PUBLIC KEY-----
    REPLACE_ME
    -----END PUBLIC KEY-----
  GOOGLE_CLIENT_ID: REPLACE_ME
  GOOGLE_CLIENT_SECRET: REPLACE_ME
  GITHUB_CLIENT_ID: REPLACE_ME
  GITHUB_CLIENT_SECRET: REPLACE_ME
  S3_ACCESS_KEY_ID: REPLACE_ME
  S3_SECRET_ACCESS_KEY: REPLACE_ME
  CLOUDFRONT_DOMAIN: cdn.harmony.example
  CLOUDFRONT_KEY_PAIR_ID: REPLACE_ME
  CLOUDFRONT_PRIVATE_KEY_PEM: REPLACE_ME
  SMTP_HOST: email-smtp.eu-west-1.amazonaws.com
  SMTP_PORT: "587"
  SMTP_USER: REPLACE_ME
  SMTP_PASS: REPLACE_ME
  SMTP_FROM: "Harmony <no-reply@harmony.example>"
  SENTRY_DSN: ""
