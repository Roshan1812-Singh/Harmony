apiVersion: apps/v1
kind: Deployment
metadata:
  name: harmony-api
  namespace: harmony
  labels:
    app: harmony-api
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 1, maxUnavailable: 0 }
  selector:
    matchLabels: { app: harmony-api }
  template:
    metadata:
      labels: { app: harmony-api }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/api/v1/metrics"
        prometheus.io/port: "4000"
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: api
          image: ghcr.io/harmony/api:latest
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 4000, name: http }]
          envFrom:
            - configMapRef: { name: harmony-api-config }
            - secretRef: { name: harmony-api-secrets }
          resources:
            requests: { cpu: 250m, memory: 384Mi }
            limits:   { cpu: 1000m, memory: 768Mi }
          readinessProbe:
            httpGet: { path: /readyz, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 20
            periodSeconds: 15
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 5"]   # drain
---
apiVersion: v1
kind: Service
metadata:
  name: harmony-api
  namespace: harmony
spec:
  selector: { app: harmony-api }
  ports:
    - name: http
      port: 80
      targetPort: 4000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: harmony-api
  namespace: harmony
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: harmony-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 70 }
