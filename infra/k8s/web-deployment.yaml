apiVersion: apps/v1
kind: Deployment
metadata:
  name: harmony-web
  namespace: harmony
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 1, maxUnavailable: 0 }
  selector:
    matchLabels: { app: harmony-web }
  template:
    metadata:
      labels: { app: harmony-web }
    spec:
      containers:
        - name: web
          image: ghcr.io/harmony/web:latest
          ports: [{ containerPort: 3000, name: http }]
          env:
            - { name: NEXT_PUBLIC_API_URL, value: "https://api.harmony.example/api/v1" }
            - { name: NEXT_PUBLIC_SITE_URL, value: "https://harmony.example" }
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits:   { cpu: 500m, memory: 512Mi }
          readinessProbe:
            httpGet: { path: /, port: http }
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: harmony-web
  namespace: harmony
spec:
  selector: { app: harmony-web }
  ports:
    - { name: http, port: 80, targetPort: 3000 }
