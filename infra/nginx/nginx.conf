user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;

events {
  worker_connections 16384;
  multi_accept on;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  server_tokens off;
  keepalive_timeout 65;
  client_max_body_size 110m;        # match audio upload cap (100m + headroom)

  gzip on;
  gzip_comp_level 5;
  gzip_min_length 256;
  gzip_proxied any;
  gzip_vary on;
  gzip_types
    application/json
    application/javascript
    application/atom+xml
    application/rss+xml
    text/css
    text/javascript
    text/plain
    text/xml
    image/svg+xml
    application/vnd.api+json
    application/vnd.apple.mpegurl;

  # Rate-limit zones
  limit_req_zone $binary_remote_addr zone=anon_reads:10m rate=120r/m;
  limit_req_zone $binary_remote_addr zone=auth_writes:10m rate=20r/m;

  log_format json escape=json
    '{"ts":"$time_iso8601","client":"$remote_addr","method":"$request_method","path":"$request_uri","status":$status,"bytes":$body_bytes_sent,"rt":$request_time,"ua":"$http_user_agent"}';
  access_log /var/log/nginx/access.log json;
  error_log  /var/log/nginx/error.log warn;

  upstream harmony_api { server api:4000; keepalive 64; }
  upstream harmony_web { server web:3000; keepalive 64; }

  server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # ─── Web (Next.js) ───
    location / {
      limit_req zone=anon_reads burst=50 nodelay;
      proxy_pass http://harmony_web;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection "";
    }

    # ─── API: stricter for writes, byte-range support for any stream proxies ───
    location /api/ {
      if ($request_method ~ ^(POST|PUT|PATCH|DELETE)$) {
        set $limit_target "writes";
      }
      limit_req zone=auth_writes burst=10 nodelay;
      proxy_pass http://harmony_api;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection "";
      proxy_buffering off;
      proxy_request_buffering off;
    }

    # ─── Health probe pass-through ───
    location /healthz { proxy_pass http://harmony_api; }
    location /readyz  { proxy_pass http://harmony_api; }
  }
}
