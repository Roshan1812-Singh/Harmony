global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: harmony-api
    metrics_path: /api/v1/metrics
    static_configs:
      - targets: ["host.docker.internal:4000"]
        labels:
          service: api

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
