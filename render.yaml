# Render Blueprint — provisions the Harmony API + Postgres + Redis in one click.
# In Render: New → Blueprint → connect this repo. Render reads this file.
# After the first deploy, set WEB_ORIGIN and CORS_ORIGINS to your Vercel URL
# (they're marked sync:false so you fill them in the dashboard).
#
# Docs: https://render.com/docs/blueprint-spec

databases:
  - name: harmony-db
    databaseName: harmony
    user: harmony
    plan: free # NOTE: Render's free Postgres expires after ~30 days.

services:
  # Redis / Key Value store (refresh tokens + BullMQ queues).
  - type: redis
    name: harmony-redis
    plan: free
    ipAllowList: [] # internal-only access

  # NestJS API (Docker build from the repo-root Dockerfile).
  - type: web
    name: harmony-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/v1/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_GLOBAL_PREFIX
        value: api/v1
      - key: DATABASE_URL
        fromDatabase:
          name: harmony-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: harmony-redis
          property: connectionString
      # Cross-site auth cookies (frontend + app live on other domains).
      - key: COOKIE_SECURE
        value: "true"
      - key: COOKIE_SAMESITE
        value: none
      - key: COOKIE_DOMAIN
        value: ""
      - key: JWT_ISSUER
        value: harmony
      - key: JWT_ACCESS_TTL
        value: 15m
      - key: JWT_REFRESH_TTL
        value: 30d
      # Fill these with your Vercel URL after the frontend is deployed.
      - key: WEB_ORIGIN
        sync: false
      - key: CORS_ORIGINS
        sync: false
