# Render Blueprint — provisions ONLY the Harmony API web service.
# Postgres and Redis are hosted externally on free tiers (Neon + Upstash),
# because Render's free tier allows just one free Postgres + one free Key Value
# per account (already used by another project here).
#
# In Render: New → Blueprint → connect this repo. Render reads this file.
# After the first sync, fill in the env vars marked `sync: false` in the
# harmony-api service's Environment tab:
#   DATABASE_URL  → Neon Postgres connection string (use the DIRECT, non-pooled
#                   URL, ending with ?sslmode=require)
#   REDIS_URL     → Upstash Redis URL (rediss://default:<password>@<host>:6379)
#   WEB_ORIGIN    → https://harmony-web-beige.vercel.app   (no trailing slash)
#   CORS_ORIGINS  → https://harmony-web-beige.vercel.app   (no trailing slash)
#
# Docs: https://render.com/docs/blueprint-spec

services:
  # NestJS API (Docker build from the repo-root Dockerfile).
  - type: web
    name: harmony-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/v1/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_GLOBAL_PREFIX
        value: api/v1
      # External managed Postgres (Neon). Paste the connection string.
      - key: DATABASE_URL
        sync: false
      # External managed Redis (Upstash). Paste the rediss:// URL.
      - key: REDIS_URL
        sync: false
      # Cross-site auth cookies (frontend + app live on other domains).
      - key: COOKIE_SECURE
        value: "true"
      - key: COOKIE_SAMESITE
        value: none
      - key: COOKIE_DOMAIN
        value: ""
      - key: JWT_ISSUER
        value: harmony
      - key: JWT_ACCESS_TTL
        value: 15m
      - key: JWT_REFRESH_TTL
        value: 30d
      # Your Vercel frontend URL (no trailing slash). Fill after frontend deploy.
      - key: WEB_ORIGIN
        sync: false
      - key: CORS_ORIGINS
        sync: false
